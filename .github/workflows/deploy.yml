name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Pull the code from your repo
      - uses: actions/checkout@v4

      # 2. Set up Java Environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Build the JAR file (Skip tests to save time)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Copy the JAR to EC2 using SCP
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar, pom.xml"
          target: "/home/${{ secrets.EC2_USERNAME }}/app"
          strip_components: 1

      # 5. Restart the App on EC2
      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Kill the process running on port 8080 (your app)
            sudo fuser -k 8080/tcp || true
            # Run the new JAR in the background
            nohup java -jar /home/${{ secrets.EC2_USERNAME }}/app/*.jar > /home/${{ secrets.EC2_USERNAME }}/app/log.txt 2>&1 &
