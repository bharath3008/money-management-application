name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - uses: actions/checkout@v4

      # 2. Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Build JAR
      - name: Build with Maven
        working-directory: Backend
        run: mvn clean package -DskipTests

      # 4. Verify build artifact
      - name: Verify JAR
        run: ls -l Backend/target

      # 5. Copy JAR to EC2
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "Backend/target/*.jar"
          target: "/home/${{ secrets.EC2_USERNAME }}/app"

      # 6. Restart Application
      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.EC2_USERNAME }}/app
            pkill -f 'java -jar' || true
            nohup java -jar /home/${{ secrets.EC2_USERNAME }}/app/*.jar > /home/${{ secrets.EC2_USERNAME }}/app/log.txt 2>&1 &
