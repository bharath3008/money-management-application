name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - uses: actions/checkout@v4

      # 2. Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Build JAR
      - name: Build with Maven
        working-directory: Backend
        run: mvn clean package -DskipTests

      # 4. Verify build artifact
      - name: Verify JAR
        run: ls -l Backend/target

      # 5. Copy JAR to EC2
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "Backend/target/*.jar"
          target: "/home/${{ secrets.EC2_USERNAME }}/app"

      # 6. Restart Application
      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
              script: |
                APP_DIR=/home/${{ secrets.EC2_USERNAME }}/app
              
                mkdir -p $APP_DIR
              
                echo "Looking for running Spring Boot app..."
                PID=$(pgrep -f "java -jar $APP_DIR")
              
                if [ -n "$PID" ]; then
                  echo "Stopping application with PID $PID"
                  kill -9 $PID
                  sleep 3
                else
                  echo "No running application found"
                fi
              
                echo "Checking deployed JAR..."
                ls -l $APP_DIR
              
                JAR_FILE=$(ls $APP_DIR/*.jar | head -n 1)
              
                echo "Starting application with $JAR_FILE"
              
                nohup java -jar $JAR_FILE > $APP_DIR/log.txt 2>&1 &
